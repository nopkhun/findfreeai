services:
  # Proxy รันบน Docker
  smlairouter:
    build: .
    container_name: smlairouter
    restart: unless-stopped
    ports:
      - "8900:8900"
    volumes:
      - /opt/findfreeai/api_keys.json:/app/api_keys.json
      - /opt/findfreeai/.env:/app/.env
      - /opt/findfreeai/data:/app/data
    environment:
      - PYTHONIOENCODING=utf-8
      - TZ=Asia/Bangkok
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8900/', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # OpenClaw (ไม่ expose port ตรง)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: smlairouter-openclaw
    user: "root"
    restart: unless-stopped
    volumes:
      - ./openclaw-test:/home/node/.openclaw
    environment:
      - HOME=/home/node
      - TZ=Asia/Bangkok
      - FINDFREEAI_API_KEY=any
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK=true
      - OPENCLAW_GATEWAY_MODE=local
    depends_on:
      - smlairouter
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 🔥 nginx proxy (ตัวสำคัญ)
  openclaw-proxy:
    image: nginx:alpine
    container_name: openclaw-proxy
    restart: unless-stopped
    depends_on:
      - openclaw
    ports:
      - "18790:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf